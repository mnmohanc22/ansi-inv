

# ── Send email — plain text ───────────────────────────────────────
- name: "[email] Send plain text email — {{ email_subject }}"
  mail:
    host:     "{{ smtp_host }}"
    port:     "{{ smtp_port | default(25) }}"
    username: "{{ smtp_user | default(omit) }}"
    password: "{{ smtp_password | default(omit) }}"
    secure:   "{{ smtp_secure | default('starttls') }}"
    from:     "{{ email_from | default(smtp_from) }}"
    to:       "{{ email_to if email_to is string else email_to | join(',') }}"
    cc:       "{{ email_cc  | default(omit) }}"
    bcc:      "{{ email_bcc | default(omit) }}"
    subject:  "{{ email_subject }}"
    body:     "{{ email_body }}"
    charset:  "{{ email_charset | default('utf-8') }}"
    attach:   "{{ email_attach  | default(omit) }}"
    timeout:  "{{ smtp_timeout  | default(30) }}"
  register: _email_result
  no_log: "{{ email_no_log | default(false) }}"
  when: email_type | default('plain') == 'plain'
  tags:
    - always
    - email


- name: Send  completion email
  ansible.builtin.mail:
    host: "{{ smtp_host }}"
    port: "{{ smtp_port | default(25) }}"
    to: "{{ email_to | default('ops-team@company.com') }}"
    from: "{{ email_from | default('aap@company.com') }}"
    subject: "Completed"
    body: |
       completed successfully.

       ID: {{ id }}
       AWS Account: {{ account_id }}
       Status: SUCCESS


- name: Send authenticated email
  ansible.builtin.mail:
    host: smtp.office365.com
    port: 587
    secure: starttls
    username: "{{ smtp_user }}"
    password: "{{ smtp_password }}"
    to:
      - ops@company.com
      - devops@company.com
    from: automation@company.com
    subject: "Deployment Status"
    body: |
      Deployment completed successfully.

      Application: payment-api
      Version: 1.2.5
      Environment: DEV

- name: Send plain text email
  ansible.builtin.mail:
    host: smtp.company.com
    port: 25
    to: admin@company.com
    from: ansible@company.com
    subject: "AAP Job Notification"
    body: |
      Hello Team,

      The patching job completed successfully.

      Job ID: {{ tower_job_id }}
      Environment: PROD

      Regards,
      Ansible Automation Platform


- name: Send email using mailx
  ansible.builtin.shell: |
    echo "Test email from Ansible" | mailx \
      -s "Test Email" \
      -r "ansible@company.com" \
      user@company.com

- name: Send email via mailx with SMTP
  ansible.builtin.shell: |
    echo "{{ email_body }}" | mailx \
      -v \
      -s "{{ email_subject }}" \
      -r "{{ email_from }}" \
      -S smtp="{{ smtp_host }}:{{ smtp_port | default(25) }}" \
      "{{ email_to }}"
  no_log: true