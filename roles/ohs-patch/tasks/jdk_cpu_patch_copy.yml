---
# ─── tasks/jdk_cpu_patch_copy.yml ───────────────────────────────────────────
# Copy the JDK CPU archive from the role's files/ directory to the patch
# stage directory on the target. Skipped when the expected JDK version is
# already active.

- name: "Copy JDK CPU archive"
  block:

    - name: "Copy JDK CPU archive"
      ansible.builtin.copy:
        src: "files/{{ jdk_archive }}"
        dest: "{{ patch_stage_dir }}/{{ jdk_archive }}"
        owner: "{{ oracle_user }}"
        group: "{{ oracle_group }}"
        mode: "0644"

  when: not (jdk_already_installed | default(false))
  tags:
    - ohs_patch
    - patch
    - jdk_cpu_patch
    - jdk
    - copy
    - dry_run
