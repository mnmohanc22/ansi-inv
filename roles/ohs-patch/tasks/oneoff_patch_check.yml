---
# ─── tasks/oneoff_patch_check.yml ───────────────────────────────────────────
# Block 1: Check whether the one-off patch is already installed in the
# Oracle Home. Sets the `oneoff_patch_installed` fact used by the copy and
# apply blocks.

- name: "Check if one-off patch is already installed"
  block:

    - name: "Display one-off patch configuration"
      ansible.builtin.debug:
        msg: |
          One-off Patch Configuration:
          - Oracle Home:    {{ oracle_home }}
          - Patch ID:       {{ oneoff_patch.patch_id }}
          - Patch Zip:      {{ oneoff_patch.patch_zip }}
          - Patch Stage Dir:{{ patch_stage_dir }}

    - name: "Check installed patches before one-off"
      ansible.builtin.command: "{{ oracle_home }}/OPatch/opatch lspatches"
      become: true
      become_user: "{{ oracle_user }}"
      register: oneoff_installed_patches
      changed_when: false

    - name: "Set one-off patch installed fact"
      ansible.builtin.set_fact:
        oneoff_patch_installed: "{{ oneoff_patch.patch_id in oneoff_installed_patches.stdout }}"

    - name: "Display one-off patch installed status"
      ansible.builtin.debug:
        msg: >-
          One-off patch {{ oneoff_patch.patch_id }} installed: {{ oneoff_patch_installed }}

  tags:
    - ohs_patch
    - check
    - oneoff_patch
    - oneoff
    - dry_run
