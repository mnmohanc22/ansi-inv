---
# ─── tasks/jdk_cpu_patch.yml ────────────────────────────────────────────────
# Apply the quarterly JDK CPU (Critical Patch Update) used by OHS/FMW.
# This orchestrator detects the current JDK and then runs the work split
# across imported step files, in order:
#   1. jdk_cpu_patch_backup.yml  - back up the current JDK
#   2. jdk_cpu_patch_copy.yml    - copy the new JDK archive to the stage dir
#   3. jdk_cpu_patch_extract.yml - extract, repoint JAVA_HOME, verify
#
# import_tasks is used (static) so the inner block tags are preserved for
# --tags filtering (backup / copy / extract / jdk_cpu_patch / jdk).

- name: "Detect current JDK"
  block:

    - name: "Display JDK CPU patch configuration"
      ansible.builtin.debug:
        msg: |
          JDK CPU Patch Configuration:
          - JDK Archive:     {{ jdk_archive }}
          - JDK Version Dir: {{ jdk_version_dir }}
          - Java Parent Dir: {{ java_parent_dir }}
          - Java Home Link:  {{ java_home_link }}
          - Backup Dir:      {{ backup_dir }}
          - Expected Ver:    {{ expected_java_version }}

    - name: "Check current Java version"
      ansible.builtin.command: "{{ java_home_link }}/bin/java -version"
      register: current_java_version
      changed_when: false
      failed_when: false

    - name: "Set JDK already installed fact"
      ansible.builtin.set_fact:
        jdk_already_installed: "{{ expected_java_version in (current_java_version.stderr | default('')) }}"

    - name: "Report JDK already at expected version (skipping patch)"
      ansible.builtin.debug:
        msg: "JDK already at expected version {{ expected_java_version }}. Skipping JDK CPU patch."
      when: jdk_already_installed

  tags:
    - ohs_patch
    - patch
    - jdk_cpu_patch
    - jdk
    - backup
    - copy
    - extract
    - dry_run

# ── JDK CPU patch - backup current JDK ──────────────────────────────────────
- name: "JDK CPU patch - backup current JDK"
  ansible.builtin.import_tasks: jdk_cpu_patch_backup.yml
  tags:
    - ohs_patch
    - patch
    - jdk_cpu_patch
    - jdk
    - backup
    - dry_run

# ── JDK CPU patch - copy archive ────────────────────────────────────────────
- name: "JDK CPU patch - copy archive"
  ansible.builtin.import_tasks: jdk_cpu_patch_copy.yml
  tags:
    - ohs_patch
    - patch
    - jdk_cpu_patch
    - jdk
    - copy
    - dry_run

# ── JDK CPU patch - extract and repoint JAVA_HOME ───────────────────────────
- name: "JDK CPU patch - extract and verify"
  ansible.builtin.import_tasks: jdk_cpu_patch_extract.yml
  tags:
    - ohs_patch
    - patch
    - jdk_cpu_patch
    - jdk
    - extract
