---
- name: "Parse and prepare patch list"
  block:

    - name: "Fail if neither patch_id_list nor patch_id_list_json is defined"
      ansible.builtin.fail:
        msg: "You must provide either patch_id_list (YAML) or patch_id_list_json (JSON string) via Extra Variables or Survey."
      when:
        - patch_id_list | default([]) | length == 0
        - patch_id_list_json | default('') | length == 0

    - name: "Convert patch_id_list_json survey input to list"
      ansible.builtin.set_fact:
        patch_id_list: "{{ patch_id_list_json | from_json }}"
      when: patch_id_list_json | default('') | length > 0

    - name: "Validate patch_id_list entries have required keys"
      ansible.builtin.fail:
        msg: "Entry '{{ item }}' is missing 'patch_id' or 'patch_zip' key."
      loop: "{{ patch_id_list }}"
      when:
        - item.patch_id is not defined or item.patch_zip is not defined

    - name: "Build patch_number_list from patch_id_list"
      ansible.builtin.set_fact:
        patch_number_list: "{{ patch_id_list | map(attribute='patch_id') | list }}"

    - name: "Display total patches to process"
      ansible.builtin.debug:
        msg: "Total patches to process: {{ patch_id_list | length }}"

    - name: "Print each patch_id and zip file"
      ansible.builtin.debug:
        msg: "Patch ID: {{ item.patch_id }} | Zip File: {{ item.patch_zip }}"
      loop: "{{ patch_id_list }}"
      loop_control:
        label: "{{ item.patch_id }}"

    - name: "Display patch_number_list"
      ansible.builtin.debug:
        msg: "Patch number list: {{ patch_number_list }}"

  delegate_to: localhost
  run_once: true
  tags:
    - ohs_patch
    - prepare
    - prepare-patch
    - copy
    - copy_patch
    - extract
    - patches

- name: "Copy each patch to stage directory"
  ansible.builtin.include_tasks:
    file: copy-patch.yml
    apply:
      tags:
        - ohs_patch
        - prepare-patch
        - copy
        - copy_patch
        - patches
  loop: "{{ patch_id_list }}"
  loop_control:
    loop_var: patch_item
    label: "{{ patch_item.patch_id }}"
  tags:
    - ohs_patch
    - prepare-patch
    - copy
    - copy_patch
    - patches

- name: "Extract each patch on target"
  ansible.builtin.include_tasks:
    file: extract-patch.yml
    apply:
      tags:
        - ohs_patch
        - prepare-patch
        - extract
        - patches
  loop: "{{ patch_id_list }}"
  loop_control:
    loop_var: patch_item
    label: "{{ patch_item.patch_id }}"
  tags:
    - ohs_patch
    - prepare-patch
    - extract
    - patches


- name: "Check each patch install status"
  ansible.builtin.include_tasks:
    file: patch-check.yml
    apply:
      tags:
        - ohs_patch
        - patch_check
        - patches
  loop: "{{ patch_id_list }}"
  loop_control:
    loop_var: patch_item
    label: "{{ patch_item.patch_id }}"
  tags:
    - ohs_patch
    - patch_check
    - patches

- name: "Apply each patch"
  ansible.builtin.include_tasks:
    file: patch-apply.yml
    apply:
      tags:
        - ohs_patch
        - patch_apply
        - patches
  loop: "{{ patch_id_list }}"
  loop_control:
    loop_var: patch_item
    label: "{{ patch_item.patch_id }}"
  tags:
    - ohs_patch
    - patch_apply
    - patches
