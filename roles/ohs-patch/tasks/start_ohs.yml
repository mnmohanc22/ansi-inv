---
# ─── tasks/start_ohs.yml ────────────────────────────────────────────────────
# Start the Oracle OHS instance. Supports two deployment styles:
#   Path A: systemd-managed unit ({{ ohs_service_name }}.service)
#   Path B: 12c standalone domain via Node Manager + startComponent.sh

- name: "Start Oracle OHS instance"
  block:

    - name: "Display OHS start configuration"
      ansible.builtin.debug:
        msg: |
          OHS Start Configuration:
          - Oracle Home (OHS): {{ oracle_home_ohs }}
          - Domain Home:       {{ ohs_domain_home }}
          - Component Name:    {{ ohs_component_name }}
          - Service Name:      {{ ohs_service_name }}
          - Listen Port:       {{ ohs_listen_port }}

    - name: "Check if OHS systemd unit exists"
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ ohs_service_name }}.service"
      register: ohs_unit_stat
      become: true

    # ── Path A: systemd-managed OHS ─────────────────────────────────────────
    - name: "Start OHS via systemd"
      ansible.builtin.systemd:
        name: "{{ ohs_service_name }}"
        state: started
        enabled: true
      become: true
      when: ohs_unit_stat.stat.exists
      register: ohs_systemd_start

    # ── Path B: Node Manager + startComponent.sh (12c standalone) ────────────
    - name: "Ensure Node Manager is running (12c standalone)"
      ansible.builtin.shell: >-
        nohup {{ ohs_domain_home }}/bin/startNodeManager.sh
        </dev/null >/tmp/nm_start.log 2>&1 &
      become: true
      become_user: "{{ oracle_user }}"
      environment:
        ORACLE_HOME: "{{ oracle_home_ohs }}"
        DOMAIN_HOME: "{{ ohs_domain_home }}"
      when: not ohs_unit_stat.stat.exists
      changed_when: false

    - name: "Wait for Node Manager port to come up (max {{ ohs_start_timeout }}s)"
      ansible.builtin.wait_for:
        host: "{{ ansible_hostname }}"
        port: "{{ ohs_nodemanager_port }}"
        state: started
        timeout: "{{ ohs_start_timeout }}"
      when: not ohs_unit_stat.stat.exists
      ignore_errors: true

    - name: "Start OHS component via startComponent.sh"
      ansible.builtin.command: >-
        {{ ohs_domain_home }}/bin/startComponent.sh {{ ohs_component_name }}
      become: true
      become_user: "{{ oracle_user }}"
      environment:
        ORACLE_HOME: "{{ oracle_home_ohs }}"
        DOMAIN_HOME: "{{ ohs_domain_home }}"
      when: not ohs_unit_stat.stat.exists
      register: ohs_component_start
      changed_when: "'successfully started' in (ohs_component_start.stdout | lower)"
      failed_when:
        - ohs_component_start.rc is defined
        - ohs_component_start.rc != 0
        - "'already' not in (ohs_component_start.stdout | lower)"

    # ── Verify OHS is accepting connections ─────────────────────────────────
    - name: "Wait for OHS to accept connections (max {{ ohs_start_timeout }}s)"
      ansible.builtin.wait_for:
        host: "{{ ansible_hostname }}"
        port: "{{ ohs_listen_port }}"
        state: started
        timeout: "{{ ohs_start_timeout }}"
      register: ohs_port_up
      ignore_errors: true

    - name: "Display OHS start result"
      ansible.builtin.debug:
        msg: |
          OHS Start Result:
          ─────────────────────────────────────────────────────────────
          - Component:    {{ ohs_component_name }}
          - Method:       {{ 'systemd' if ohs_unit_stat.stat.exists else 'startComponent.sh' }}
          - Listen Port:  {{ ohs_listen_port }}
          - Port Up:      {{ not (ohs_port_up.failed | default(false)) }}
          ─────────────────────────────────────────────────────────────

    - name: "Set OHS start facts"
      ansible.builtin.set_fact:
        ohs_started: "{{ not (ohs_port_up.failed | default(false)) }}"
        ohs_start_method: "{{ 'systemd' if ohs_unit_stat.stat.exists else 'startComponent.sh' }}"

    - name: "Start Oracle HTTP Server"
      become: true
      become_user: "{{ ohs_user }}"
      ansible.builtin.shell: |
        {{ ohs_domain_home }}/bin/startComponent.sh {{ ohs_component_name }}
      register: ohs_start
      changed_when: "'Successfully' in ohs_start.stdout"
      failed_when:
        - ohs_start.rc is defined
        - ohs_start.rc != 0
        - "'already' not in (ohs_start.stdout | lower)"

    - name: "Display startup output"
      ansible.builtin.debug:
        var: ohs_start.stdout_lines

  tags:
    - ohs_patch
    - start
    - start_ohs
    - ohs

# ─── Start Node Manager (12c standalone) ────────────────────────────────────
# Start Node Manager BEFORE the OHS component. Only relevant for the Node
# Manager deployment style (Path B); skipped when OHS is systemd-managed.
- name: "Start OHS Node Manager"
  block:

    - name: "Display Node Manager start configuration"
      ansible.builtin.debug:
        msg: |
          Node Manager Start Configuration:
          - Domain Home:        {{ ohs_domain_home }}
          - Node Manager Port:  {{ ohs_nodemanager_port }}
          - OHS User:           {{ ohs_user }}

    - name: "Check if OHS systemd unit exists"
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ ohs_service_name }}.service"
      register: ohs_unit_stat_start_nm
      become: true

    - name: "Check if startNodeManager.sh exists"
      ansible.builtin.stat:
        path: "{{ ohs_domain_home }}/bin/startNodeManager.sh"
      register: start_nm_script_stat

    - name: "Print Node Manager start command before running"
      ansible.builtin.debug:
        msg: >-
          About to run (as {{ ohs_user }}):
          nohup {{ ohs_domain_home }}/bin/startNodeManager.sh </dev/null >/tmp/nm_start.log 2>&1 &
      when:
        - not ohs_unit_stat_start_nm.stat.exists
        - start_nm_script_stat.stat.exists

    - name: "Start Node Manager via startNodeManager.sh"
      become: true
      become_user: "{{ ohs_user }}"
      ansible.builtin.shell: >-
        nohup {{ ohs_domain_home }}/bin/startNodeManager.sh
        </dev/null >/tmp/nm_start.log 2>&1 &
      environment:
        ORACLE_HOME: "{{ oracle_home_ohs }}"
        DOMAIN_HOME: "{{ ohs_domain_home }}"
      register: nm_start
      changed_when: false
      when:
        - not ohs_unit_stat_start_nm.stat.exists
        - start_nm_script_stat.stat.exists

    - name: "Wait for Node Manager port to come up (max {{ ohs_start_timeout }}s)"
      ansible.builtin.wait_for:
        host: "{{ ansible_hostname }}"
        port: "{{ ohs_nodemanager_port }}"
        state: started
        timeout: "{{ ohs_start_timeout }}"
      register: nm_port_up
      when: not ohs_unit_stat_start_nm.stat.exists
      ignore_errors: true

    - name: "Set Node Manager start facts"
      ansible.builtin.set_fact:
        ohs_nodemanager_started: "{{ not ohs_unit_stat_start_nm.stat.exists and not (nm_port_up.failed | default(false)) }}"

    - name: "Display Node Manager start summary"
      ansible.builtin.debug:
        msg: |
          Node Manager Start:
          ─────────────────────────────────────────────────────────────
          - Node Manager Port: {{ ohs_nodemanager_port }}
          - Managed By:        {{ 'systemd (skipped)' if ohs_unit_stat_start_nm.stat.exists else 'Node Manager' }}
          - Started:           {{ ohs_nodemanager_started }}
          ─────────────────────────────────────────────────────────────

  tags:
    - ohs_patch
    - start
    - start_ohs
    - start_nodemanager
    - ohs