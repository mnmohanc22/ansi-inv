---
# ─── tasks/middleware_patch.yml ─────────────────────────────────────────────
# Apply a Middleware (FMW) Bundle / SPB / PSU patch to the Oracle Home:
# detect if already installed, stage and extract the patch, back up the
# Oracle Home, run a conflict check, apply via OPatch, and verify.

- name: "Apply Middleware (FMW) patch"
  block:

    - name: "Display Middleware patch configuration"
      ansible.builtin.debug:
        msg: |
          Middleware Patch Configuration:
          - Oracle Home:        {{ oracle_home }}
          - Middleware Patch ID:{{ middleware_patch_id }}
          - Patch Zip:          {{ middleware_patch_zip }}
          - Patch Stage Dir:    {{ patch_stage_dir }}
          - Backup Dir:         {{ backup_dir }}

    - name: "Check installed Middleware patches"
      ansible.builtin.command: "{{ oracle_home }}/OPatch/opatch lspatches"
      become: true
      become_user: "{{ oracle_user }}"
      register: installed_patches
      changed_when: false

    - name: "Set Middleware patch already installed fact"
      ansible.builtin.set_fact:
        middleware_patch_installed: "{{ middleware_patch_id in installed_patches.stdout }}"

    - name: "Report Middleware patch already installed (skipping)"
      ansible.builtin.debug:
        msg: "Middleware patch {{ middleware_patch_id }} already installed. Skipping."
      when: middleware_patch_installed

    - name: "Ensure backup directory exists"
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        owner: "{{ oracle_user }}"
        group: "{{ oracle_group }}"
        mode: "0755"
      become: true
      when: not middleware_patch_installed

    - name: "Copy Middleware patch zip"
      ansible.builtin.copy:
        src: "files/{{ middleware_patch_zip }}"
        dest: "{{ patch_stage_dir }}/{{ middleware_patch_zip }}"
        owner: "{{ oracle_user }}"
        group: "{{ oracle_group }}"
        mode: "0644"
      when: not middleware_patch_installed

    - name: "Extract Middleware patch"
      ansible.builtin.unarchive:
        src: "{{ patch_stage_dir }}/{{ middleware_patch_zip }}"
        dest: "{{ patch_stage_dir }}"
        remote_src: true
        owner: "{{ oracle_user }}"
        group: "{{ oracle_group }}"
      when: not middleware_patch_installed

    - name: "Backup Oracle Home before Middleware patch"
      ansible.builtin.archive:
        path: "{{ oracle_home }}"
        dest: "{{ backup_dir }}/oracle_home_backup_{{ ansible_date_time.iso8601_basic_short }}.tar.gz"
        format: gz
      become: true
      when: not middleware_patch_installed

    - name: "Run Middleware patch conflict check"
      ansible.builtin.command: >
        {{ oracle_home }}/OPatch/opatch prereq CheckConflictAgainstOHWithDetail -ph ./
      args:
        chdir: "{{ patch_stage_dir }}/{{ middleware_patch_id }}"
      become: true
      become_user: "{{ oracle_user }}"
      environment:
        ORACLE_HOME: "{{ oracle_home }}"
        JAVA_HOME: "{{ java_home_link }}"
      register: middleware_conflict_check
      changed_when: false
      when: not middleware_patch_installed

    - name: "Apply Middleware Bundle/SPB/PSU patch"
      ansible.builtin.command: >
        {{ oracle_home }}/OPatch/opatch apply -silent
      args:
        chdir: "{{ patch_stage_dir }}/{{ middleware_patch_id }}"
      become: true
      become_user: "{{ oracle_user }}"
      environment:
        ORACLE_HOME: "{{ oracle_home }}"
        JAVA_HOME: "{{ java_home_link }}"
      register: middleware_patch_apply
      changed_when: true
      when: not middleware_patch_installed

    - name: "Verify Middleware patch installed"
      ansible.builtin.command: "{{ oracle_home }}/OPatch/opatch lspatches"
      become: true
      become_user: "{{ oracle_user }}"
      register: middleware_patch_verify
      changed_when: false

    - name: "Fail if Middleware patch not installed"
      ansible.builtin.fail:
        msg: "Middleware patch {{ middleware_patch_id }} was not found after install."
      when: middleware_patch_id not in middleware_patch_verify.stdout

    - name: "Display Middleware patch result"
      ansible.builtin.debug:
        msg: |
          Middleware Patch Result:
          ─────────────────────────────────────────────────────────────
          - Oracle Home:        {{ oracle_home }}
          - Middleware Patch ID:{{ middleware_patch_id }}
          - Applied This Run:   {{ not middleware_patch_installed }}
          - Present After:      {{ middleware_patch_id in middleware_patch_verify.stdout }}
          ─────────────────────────────────────────────────────────────

    - name: "Set Middleware patch facts"
      ansible.builtin.set_fact:
        ohs_middleware_patched: "{{ not middleware_patch_installed }}"
        ohs_middleware_patches_output: "{{ middleware_patch_verify.stdout | trim }}"

  tags:
    - ohs_patch
    - patch
    - middleware_patch
    - fmw