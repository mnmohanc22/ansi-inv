    - name: "Set patch_already_installed fact"
      ansible.builtin.set_fact:
        patch_already_installed: "{{ patch_item.patch_id in lspatches_before.stdout }}"

    - name: "Display patch {{ patch_item.patch_id }} install status"
      ansible.builtin.debug:
        msg: >-
          Patch {{ patch_item.patch_id }}:
          {{ 'already installed — apply will be skipped.' if patch_already_installed else 'not installed — will be applied.' }}

  become: true
  become_user: "{{ oracle_user }}"
  tags:
