####### 1.6.2 Ensure system wide crypto policy disables sha1 hash and signature support
- name: " Block:  Ensure system wide crypto policy disables sha1 hash and signature support"
  when:
    - "'NO-SHA1' not in rhel8cis_crypto_policy_module"
  block:
    - name: "Ensure system wide crypto policy disables sha1 hash and signature support | Add submodule exclusion template"
      ansible.builtin.template:
        src: etc/crypto-policies/policies/modules/NO-SHA1.pmod.j2
        dest: /etc/crypto-policies/policies/modules/NO-SHA1.pmod
        owner: root
        group: root
        mode: 'u-x,g-wx,o-rwx'
      register: copy_no_sha1_template

    - name: " Ensure system wide crypto policy disables sha1 hash and signature support | Debug rhel8cis_crypto_policy_module before addiing NO-SHA1"
      ansible.builtin.debug:
        msg: "rhel8cis_crypto_policy_module before adding NO-SHA1: {{ rhel8cis_crypto_policy_module }}"

    - name: "Ensure system wide crypto policy disables sha1 hash and signature support | set fact to remove submodule to crypto policy modules"
      ansible.builtin.set_fact:
        rhel8cis_crypto_policy_module: "{{ rhel8cis_crypto_policy_module + ':' + 'NO-SHA1' }}"
      changed_when: copy_no_sha1_template is changed
      notify:
        - Set_Crypto_Policy

  

