 ### 6.2.3.1 Ensure access to all logfiles has been configured



- name: Ensure access to all logfiles has been configured
  block:
    - name: Find log files with insecure permissions
      ansible.builtin.shell: |
        find /var/log -type f \
        \( -perm /0137 -o ! -user root -o ! -group root \) \
        -not -path "/var/log/journal/*" \
        -not -path "/var/log/audit/*" \
        2>/dev/null
      register: insecure_log_files
      changed_when: false

    - name: Debug insecure log files
      ansible.builtin.debug:
        msg: "Insecure log files found: {{ insecure_log_files.stdout_lines | default([]) }}"
      when: insecure_log_files.stdout_lines | length > 0  

    - name: Fix permissions on normal log files
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: "0640"
      loop: "{{ insecure_log_files.stdout_lines }}"
      when: insecure_log_files.stdout_lines | length > 0

    - name: Find audit log files
      ansible.builtin.find:
        paths: /var/log/audit
        file_type: file
        recurse: true
      register: audit_log_files
      failed_when: false

    - name: Debug audit log files found
      ansible.builtin.debug:
        msg: "Audit log files found: {{ audit_log_files.files | default([]) }}"  

    - name: Secure audit log files
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: root
        group: root
        mode: "0600"
      loop: "{{ audit_log_files.files | default([]) }}"
      when: audit_log_files.files | length > 0
      register: audit_log_file_permissions
      failed_when: false

    - name: Debug audit log file permissions results
      ansible.builtin.debug:
        msg: "Audit log file permissions results: {{ audit_log_file_permissions }}"
      when: audit_log_file_permissions is defined  

    - name: Secure audit log directory
      ansible.builtin.file:
        path: /var/log/audit
        owner: root
        group: root
        mode: "0750"
        state: directory
      register: audit_log_dir_permissions
      failed_when: false

    - name: Debug audit log directory permissions results
      ansible.builtin.debug:
        msg: "Audit log directory permissions results: {{ audit_log_dir_permissions }}"
      when: audit_log_dir_permissions is defined
