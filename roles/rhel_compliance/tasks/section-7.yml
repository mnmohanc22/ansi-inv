#### 7.1.11 Ensure world writable files and directories are secured

- name: "Block: Secure world-writable files and directories"
  block:
    - name: Find world-writable files
      ansible.builtin.shell: >
        find / -xdev -type f -perm -0002
        {% for p in (cis_ww_excluded_paths | default([])) %} -not -path '{{ p }}/*' {% endfor %}
      args:
        executable: /bin/bash
      register: ww_files
      changed_when: false
      failed_when: false

    - name: "Debug: world-writable files found"
      ansible.builtin.debug:
        msg: "World-writable files: {{ ww_files.stdout_lines | default([]) }}"  

    - name: Remove world-writable permission from files
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "o-w"
      loop: "{{ ww_files.stdout_lines | default([]) }}"
      when: (ww_files.stdout_lines | default([])) | length > 0
      failed_when: false

    - name: Find world-writable directories without sticky bit
      ansible.builtin.shell: >
        find / -xdev -type d -perm -0002 ! -perm -1000
        {% for p in (cis_ww_excluded_paths | default([])) %} -not -path '{{ p }}/*' {% endfor %}
      args:
        executable: /bin/bash
      register: ww_dirs
      changed_when: false
      failed_when: false

    - name: "Debug: world-writable directories without sticky bit found"
      ansible.builtin.debug:
        msg: "World-writable directories without sticky bit: {{ ww_dirs.stdout_lines | default([]) }}"  

    - name: Add sticky bit to world-writable directories
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "+t"
      loop: "{{ ww_dirs.stdout_lines | default([]) }}"
      when: (ww_dirs.stdout_lines | default([])) | length > 0
      failed_when: false

    # - name: Save CIS world-writable audit results
