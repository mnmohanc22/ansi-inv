---
# =============================================================================
# Task File: audit_rules.yml – Write audit rule files and reload
# =============================================================================

- name: Configure audit rules
  block:
    - name: Check if audit.rules dir exists
      ansible.builtin.stat:
        path: /etc/audit/rules.d
      register: audit_rules_dir_stat

    - name: Copy existing audit.rules to backup directory if it exists
      ansible.builtin.copy:
        src: /etc/audit/audit.rules
        dest: "{{ audit_backup_dir }}/audit.rules"
        remote_src: true
      when: audit_rules_dir_stat.stat.exists

    - name: Ensure /etc/audit/rules.d exists
      ansible.builtin.file:
        path: /etc/audit/rules.d
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Remove stale audit rule files not managed by this role
      ansible.builtin.find:
        paths: /etc/audit/rules.d
        patterns: "*.rules"
      register: existing_rule_files

    - name: Determine audit rule files to remove
      ansible.builtin.set_fact:
        rule_files_to_remove: "{{ existing_rule_files.files | map(attribute='path') | difference(audit_rule_files | map(attribute='file')) }}"

    - name: list files to be removed
      ansible.builtin.debug:
        msg: "Stale audit rule files to remove: {{ rule_files_to_remove }}"
      when: rule_files_to_remove | length > 0

    - name: Remove stale audit rule files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ rule_files_to_remove }}"
      when: rule_files_to_remove | length > 0

    - name: Write each audit rule file
      ansible.builtin.template:
        src: audit_rule_file.j2
        dest: "{{ item.file }}"
        owner: root
        group: root
        mode: "0640"
        backup: true
      loop: "{{ audit_rule_files }}"
      loop_control:
        label: "{{ item.file | basename }}"
      notify: Reload audit rules

    - name: Generate merged audit.rules from rules.d
      ansible.builtin.command: augenrules --check
      register: augenrules_check
      changed_when: "'No change' not in augenrules_check.stdout"
      notify: Reload audit rules

    - name: Force augenrules merge
      ansible.builtin.command: augenrules --load
      when: augenrules_check.changed
      changed_when: true
