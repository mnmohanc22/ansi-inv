#ensure pam_loginuid is configured in PAM

- name: Ensure pam_loginuid is configured in PAM
  block:
    - name: Check if pam_loginuid.so is already configured in /etc/pam.d/system-auth
      ansible.builtin.command: "grep -E '^session\\s+required\\s+pam_loginuid\\.so' /etc/pam.d/system-auth"
      register: pam_loginuid_check
      ignore_errors: true

    - name: Configure pam_loginuid.so in /etc/pam.d/system-auth
      ansible.builtin.lineinfile:
        path: /etc/pam.d/system-auth
        line: "session required pam_loginuid.so"
        state: present
      when: pam_loginuid_check.rc != 0
      notify: Restart auditd

    - name: add for logout as well
      ansible.builtin.lineinfile:
        path: /etc/pam.d/system-auth
        line: "session required pam_loginuid.so showfailed"
        state: present
      notify: Restart auditd  

#check ausearch -k logins and tail -20

- name: Check audit logs for login events
  ansible.builtin.command: "ausearch -k logins | tail -20"
  register: audit_logins
  ignore_errors: true

- name: Display recent login events from audit logs
  ansible.builtin.debug:
    msg: "Recent login events:\n{{ audit_logins.stdout }}"

