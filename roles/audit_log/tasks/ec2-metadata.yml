---
# =============================================================================
# Task File: ec2-metadata.yml – Verify OS and fetch EC2 instance metadata
# =============================================================================

- name: Fetch and store EC2 instance metadata
  block:
    - name: Copy ec2-metadata.sh script to /usr/local/bin
      ansible.builtin.template:
        src: ec2-metadata.sh.j2
        dest: /usr/local/bin/ec2-metadata.sh
        owner: root
        group: root
        mode: "0755"
        backup: true
      register: copy_script_result

    - name: Debug copy_script_result
      ansible.builtin.debug:
        msg: "{{ copy_script_result }}"

    - name: Run ec2-metadata.sh to fetch and store EC2 metadata
      ansible.builtin.command: /usr/local/bin/ec2-metadata.sh
      register: metadata_script_result
      changed_when: false
      failed_when: metadata_script_result.rc != 0

    - name: Debug metadata_script_result
      ansible.builtin.debug:
        msg: "{{ metadata_script_result }}"

    - name: copy systemd service file for metadata enrichment
      ansible.builtin.template:
        src: aws-audit-metadata.service.j2
        dest: /etc/systemd/system/ec2-metadata.service
        owner: root
        group: root
        mode: "0644"
        backup: true
      register: copy_service_result

    - name : Debug copy_service_result
      ansible.builtin.debug:
        msg: "{{ copy_service_result }}"

    - name: Reload systemd daemon to recognize new service
      ansible.builtin.systemd:
        daemon_reload: true
      register: daemon_reload_result    

    - name: Enable and start ec2-metadata.service
      ansible.builtin.service:
        name: ec2-metadata
        enabled: true
        state: started
      register: service_result          

    - name: Debug service_result
      ansible.builtin.debug:
        msg: "{{ service_result }}"


