---
# vars file for win1-cer

dest_tmp_dir: 'C:\Temp'

root_cert_file: rootCA.crt
intermediate_cert_file: intermediateCA.crt

# Full destination paths on the Windows host (single-quoted so the backslash
# is treated literally and avoids Jinja2 escaping issues).
win_root_cert_path: '{{ dest_tmp_dir }}\{{ root_cert_file }}'
win_intermediate_cert_path: '{{ dest_tmp_dir }}\{{ intermediate_cert_file }}'


root_ca_subject: PRIME LLC Lab Root CA
#rootsha1_fingerprint: 1F:38:35:86:89:C5:45:76:F6:41:9F:16:12:11:69:6A:A4:78:02:91
rootsha1_fingerprint: 1F38358689C54576F6419F161211696AA4780291

intermediate_ca_subject: PRIME LLC Lab Intermediate CA
intermediate_sha1_fingerprint: A7C11B31FD17E9EAB830A3D58ED07C3DC14F2153

windows_cert_store_location: LocalMachine


windows_root_cert_store_path: "Cert:\\{{ windows_cert_store_location }}\\Root"
windows_root_cert_friendly_name: "PRIME LLC Lab Root CA"

windows_intermediate_cert_store_path: "Cert:\\{{ windows_cert_store_location }}\\CA"
windows_intermediate_cert_friendly_name: "PRIME LLC Lab Intermediate CA"


wec_domain_home: 'D:\Oracle\Middleware\user_projects\domains\wec_domain'
wec_server_name: capture_server1
admin_url: 't3://localhost:7001'
oracle_user: 'DOMAIN\oracle_svc'
oracle_password: '{{ vault_oracle_password }}'

wec_service_name: "Oracle WebCenter Capture - capture_server1"
wec_port: 16400

#  admin_service_name: "Oracle WebLogic AdminServer"
#   nm_service_name: "Oracle WebLogic NodeManager"
#   admin_port: 7001
#   nm_port: 5556

# ===== Patch details =====
    patch_id: 'WEC_SPB_JAN2026'
    patch_zip_src: '/runner/project/files/p6880880_122140_Generic.zip'   # Example: SPB zip copied from controller
    patch_stage_dir: 'D:\patch_stage'
    patch_extract_dir: 'D:\patch_stage\{{ patch_id }}'

    # ===== OPatch / SPBAT =====
    opatch_exe: '{{ oracle_home }}\OPatch\opatch.bat'
    spbat_script: '{{ patch_extract_dir }}\spbat\spbat.bat'

    # ===== WEC server details =====
    wec_managed_server: 'capture_server1'
    admin_server_name: 'AdminServer'

    # ===== Windows services to stop/start =====
    # Replace with your actual Windows service names if different
    wec_services:
      - 'OracleWECCaptureServer'
      - 'OracleWECAdminServer'
      - 'OracleWECNodeManager'

    # ===== Logging =====
    patch_log_dir: '{{ patch_stage_dir }}\logs'
    before_inventory_file: '{{ patch_log_dir }}\lsinventory_before_{{ patch_id }}.txt'
    after_inventory_file: '{{ patch_log_dir }}\lsinventory_after_{{ patch_id }}.txt'
    spbat_log_file: '{{ patch_log_dir }}\spbat_{{ patch_id }}.log'



patches_list:
  - patch_id: "35926646"
    patch_zip: p35926646_122140_Generic.zip
  - patch_id: "36123456"
    patch_zip: p36123456_122140_Generic.zip