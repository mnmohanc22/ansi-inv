1. PRIVATE KEY + WILDCARD CERT  →  LocalMachine\My  (so IIS can do SSL handshake)
2. INTERMEDIATE CA              →  LocalMachine\CA  (so chain builds correctly)
3. ROOT CA                      →  LocalMachine\Root (so clients trust the chain)


The One File That Does Both Jobs
wildcard.crt
    ├── Acts as SERVER CERT   →  goes into LocalMachine\My    (IIS identity)
    └── Acts as ROOT CA       →  goes into LocalMachine\Root  (trust anchor)
Same file, imported twice, into two different stores — that's all you need.



cat > wildcard.cnf <<EOF
[req]
default_bits       = 2048
prompt             = no
default_md         = sha256
distinguished_name = dn
x509_extensions    = v3_req

[dn]
C  = US
ST = GA
L  = Atlanta
O  = PMC
OU = IT
CN = *.pmcllc.com

[v3_req]
subjectAltName = @alt_names
keyUsage       = digitalSignature, keyEncipherment
extendedKeyUsage = serverAuth

[alt_names]
DNS.1 = *.pmcllc.com
DNS.2 = pmcllc.com
EOF

openssl pkcs12 -export \
    -out wildcard.pfx \
    -inkey wildcard.key \
    -in wildcard.crt \
    -name "Wildcard *.pmcllc.com"

# It will prompt:
# Enter Export Password: YourStrongPassword123!
# Verifying - Enter Export Password: YourStrongPassword123!