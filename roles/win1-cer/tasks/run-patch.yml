---
# ─── tasks/run-patch.yml ─────────────────────────────────────────────────────
# Stop WEC services, apply the SPB patch, then start services.
# Called per-patch from patch-per-id.yml after copy & extract are done.

- name: "Stop WEC services before patching {{ patch_id }}"
  tags: [patch, stop_wec]
  block:

    - name: "Save OPatch inventory before patch"
      ansible.windows.win_shell: |
        "{{ opatch_exe }}" lsinventory > "{{ before_inventory_file }}"
      args:
        chdir: "{{ oracle_home }}"
      changed_when: false

    - name: "Show pre-patch inventory path"
      ansible.builtin.debug:
        msg: "Pre-patch inventory saved to: {{ before_inventory_file }}"

    - name: "Stop WEC services"
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
      loop: "{{ wec_services }}"
      register: stop_services
      failed_when: false

    - name: "Show stop result per service"
      ansible.builtin.debug:
        msg:
          - "Service : {{ item.item }}"
          - "State   : {{ item.state | default('n/a') }}"
          - "Changed : {{ item.changed }}"
      loop: "{{ stop_services.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Wait for services to stop"
      ansible.windows.win_shell: Start-Sleep -Seconds 15
      changed_when: false


- name: "Apply SPB patch {{ patch_id }}"
  tags: [patch, apply_patch]
  block:

    - name: "Run WEC SPB patch using spbat.bat"
      ansible.windows.win_shell: |
        @echo off
        call "{{ spbat_script }}" ^
          -oh "{{ oracle_home }}" ^
          -domainHome "{{ domain_home }}" ^
          -server "{{ wec_managed_server }}" ^
          -adminServerName "{{ admin_server_name }}" ^
          > "{{ spbat_log_file }}" 2>&1
      args:
        chdir: "{{ patch_extract_dir }}"
      register: spbat_result

    - name: "Show SPBAT output"
      ansible.builtin.debug:
        msg:
          - "RC     : {{ spbat_result.rc }}"
          - "Stdout : {{ spbat_result.stdout_lines | default([]) }}"
          - "Stderr : {{ spbat_result.stderr_lines | default([]) }}"
          - "Log    : {{ spbat_log_file }}"

    - name: "Assert patch applied successfully"
      ansible.builtin.assert:
        that:
          - spbat_result.rc == 0
        fail_msg: "SPB patch {{ patch_id }} failed (rc={{ spbat_result.rc }}). Review log: {{ spbat_log_file }}"
        success_msg: "SPB patch {{ patch_id }} applied successfully."

    - name: "Save OPatch inventory after patch"
      ansible.windows.win_shell: |
        "{{ opatch_exe }}" lsinventory > "{{ after_inventory_file }}"
      args:
        chdir: "{{ oracle_home }}"
      changed_when: false

    - name: "List installed patches after apply"
      ansible.windows.win_shell: |
        "{{ opatch_exe }}" lspatches
      args:
        chdir: "{{ oracle_home }}"
      register: lspatches_after
      changed_when: false

    - name: "Show installed patches after apply"
      ansible.builtin.debug:
        msg: "{{ lspatches_after.stdout_lines }}"


- name: "Start WEC services after patching {{ patch_id }}"
  tags: [patch, start_wec]
  block:

    - name: "Start WEC services"
      ansible.windows.win_service:
        name: "{{ item }}"
        state: started
      loop: "{{ wec_services }}"
      register: start_services

    - name: "Show start result per service"
      ansible.builtin.debug:
        msg:
          - "Service : {{ item.item }}"
          - "State   : {{ item.state | default('n/a') }}"
          - "Changed : {{ item.changed }}"
      loop: "{{ start_services.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Wait for services to settle"
      ansible.windows.win_shell: Start-Sleep -Seconds 20
      changed_when: false

    - name: "Patch {{ patch_id }} summary"
      ansible.builtin.debug:
        msg:
          - "Patch {{ patch_id }} completed."
          - "SPBAT log      : {{ spbat_log_file }}"
          - "Inventory before: {{ before_inventory_file }}"
          - "Inventory after : {{ after_inventory_file }}"
