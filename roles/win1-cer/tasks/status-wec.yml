          - "RC      : {{ wec_start.rc }}"
          - "Status  : {{ 'SUCCESS' if wec_start.rc == 0 else 'FAILED' }}"
          - "Stdout  : {{ wec_start.stdout_lines }}"
          - "Stderr  : {{ wec_start.stderr_lines }}"

