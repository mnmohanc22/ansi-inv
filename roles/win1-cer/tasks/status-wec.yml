          - "Status  : {{ 'SUCCESS' if wec_stop.rc | default(1) == 0 else 'FAILED' }}"
          - "Stdout  : {{ wec_stop.stdout_lines | default([]) }}"
          - "Stderr  : {{ wec_stop.stderr_lines | default([]) }}"

- name: Check WEC process status
  tags: [status, status-wec]
  block:

    - name: Get WEC process status
      ansible.windows.win_shell: |
        Get-CimInstance Win32_Process |
        Where-Object {
          $_.CommandLine -match "{{ wec_server_name }}"
        } |
        Select-Object ProcessId, CommandLine |
        ConvertTo-Json -Depth 3
      register: wec_process
      changed_when: false
      failed_when: false

    - name: Parse WEC process list
      ansible.builtin.set_fact:
        _wec_processes: "{{ wec_process.stdout | default('[]') | from_json if wec_process.stdout | default('') | length > 0 else [] }}"

    - name: Show WEC process status
      ansible.builtin.debug:
        msg:
          - "Server     : {{ wec_server_name }}"
          - "Status     : {{ 'RUNNING' if _wec_processes | length > 0 else 'STOPPED' }}"
          - "Processes  : {{ _wec_processes | length }}"

    - name: Print WEC process details
      ansible.builtin.debug:
        msg: "PID {{ item.ProcessId }} : {{ item.CommandLine }}"
      loop: "{{ _wec_processes if _wec_processes is iterable and _wec_processes is not string and _wec_processes is not mapping else [_wec_processes] }}"
      when: _wec_processes | length > 0


- name: Get WEC process details
  tags: [status, status-wec]
  block:

    - name: Get WEC process details
      ansible.windows.win_shell: |
        Get-CimInstance Win32_Process |
        Where-Object {
          $_.CommandLine -match "{{ capture_server }}"
        } |
        Select-Object ProcessId,
                      Name,
                      CreationDate,
                      CommandLine |
        ConvertTo-Json -Depth 5
      register: wec_process
      changed_when: false
      failed_when: false

    - name: Parse WEC process details
      ansible.builtin.set_fact:
        _wec_process_details: >-
          {{ wec_process.stdout | from_json
             if wec_process.stdout | default('') | length > 0
             else [] }}

    - name: Show WEC process details
      ansible.builtin.debug:
        msg: "{{ _wec_process_details }}"


- name: Stop WEC Windows service
  tags: [stop, stop-svc]
  block:

    - name: Print command
      ansible.builtin.debug:
        msg: "CMD: Stop-Service -Name {{ wec_service_name }}"

    - name: Stop WEC Windows service
      ansible.windows.win_service:
        name: "{{ wec_service_name }}"
        state: stopped
      register: wec_svc_stop

    - name: Wait for WEC port to close
      ansible.windows.win_wait_for:
        host: localhost
        port: "{{ wec_port }}"
        state: stopped
        timeout: 180

    - name: Show WEC service stop result
      ansible.builtin.debug:
        msg:
          - "Service : {{ wec_service_name }}"
          - "State   : {{ wec_svc_stop.state | default('n/a') }}"
          - "Changed : {{ wec_svc_stop.changed }}"

- name: Start WEC Windows service
  tags: [start, start-svc]
  block:

    - name: Print command
      ansible.builtin.debug:
        msg: "CMD: Start-Service -Name {{ wec_service_name }}"

    - name: Start WEC Windows service
      ansible.windows.win_service:
        name: "{{ wec_service_name }}"
        state: started
      register: wec_svc_start

    - name: Wait for WEC port to open
      ansible.windows.win_wait_for:
        host: localhost
        port: "{{ wec_port }}"
        state: started
        timeout: 300

    - name: Show WEC service start result
      ansible.builtin.debug:
        msg:
          - "Service : {{ wec_service_name }}"
          - "State   : {{ wec_svc_start.state | default('n/a') }}"
          - "Changed : {{ wec_svc_start.changed }}"

- name: Restart WEC Windows service
  tags: [restart, restart-svc]
  block:

    - name: Print command
      ansible.builtin.debug:
        msg: "CMD: Restart-Service -Name {{ wec_service_name }}"

    - name: Restart WEC Windows service
      ansible.windows.win_service:
        name: "{{ wec_service_name }}"
        state: restarted
      register: wec_svc_restart

    - name: Wait for WEC port after restart
      ansible.windows.win_wait_for:
        host: localhost
        port: "{{ wec_port }}"
        state: started
        timeout: 300

    - name: Show WEC service restart result
      ansible.builtin.debug:
        msg:
          - "Service : {{ wec_service_name }}"
          - "State   : {{ wec_svc_restart.state | default('n/a') }}"
          - "Changed : {{ wec_svc_restart.changed }}"

- name: Get WEC Windows service status
  tags: [status, status-svc]
  block:

    - name: Get WEC Windows service info
      ansible.windows.win_service_info:
        name: "{{ wec_service_name }}"
      register: wec_service_info

    - name: Show WEC service status
      ansible.builtin.debug:
        msg:
          - "Service   : {{ wec_service_info.services[0].name }}"
          - "State     : {{ wec_service_info.services[0].state }}"
          - "StartMode : {{ wec_service_info.services[0].start_mode }}"

    - name: Find WEC/Capture Windows services
      ansible.windows.win_shell: |
        Get-Service |
        Where-Object {
          $_.Name -match 'capture|wec|webcenter' -or
          $_.DisplayName -match 'capture|wec|webcenter'
        } |
        Select-Object Name, DisplayName, Status |
        ConvertTo-Json
      register: wec_services
      changed_when: false

    - name: Show all WEC related services
      ansible.builtin.debug:
        msg: "{{ wec_services.stdout | from_json }}"


