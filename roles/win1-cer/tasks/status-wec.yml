---
- name: Start Node Manager
  tags: [start, start-nm]
  block:

    - name: Print command
      ansible.builtin.debug:
        msg: "CMD: cd {{ wec_domain_home }}\\bin && .\\startNodeManager.cmd"

    - name: Start Node Manager
      ansible.windows.win_shell: |
        cd "{{ wec_domain_home }}\bin"
        .\startNodeManager.cmd
      register: nm_start
      failed_when: false

    - name: Show Node Manager start result
      ansible.builtin.debug:
        msg:
          - "Component : Node Manager"
          - "RC        : {{ nm_start.rc }}"
          - "Status    : {{ 'SUCCESS' if nm_start.rc == 0 else 'FAILED' }}"
          - "Stdout    : {{ nm_start.stdout_lines }}"
          - "Stderr    : {{ nm_start.stderr_lines }}"

- name: Stop Node Manager
  tags: [stop, stop-nm]
  block:

    - name: Print command
      ansible.builtin.debug:
        msg: "CMD: cd {{ wec_domain_home }}\\bin && .\\stopNodeManager.cmd"

    - name: Stop Node Manager
      ansible.windows.win_shell: |
        cd "{{ wec_domain_home }}\bin"
        .\stopNodeManager.cmd
      register: nm_stop
      failed_when: false

    - name: Show Node Manager stop result
      ansible.builtin.debug:
        msg:
          - "Component : Node Manager"
          - "RC        : {{ nm_stop.rc | default('n/a') }}"
          - "Status    : {{ 'SUCCESS' if nm_stop.rc | default(1) == 0 else 'FAILED' }}"
          - "Stdout    : {{ nm_stop.stdout_lines | default([]) }}"
          - "Stderr    : {{ nm_stop.stderr_lines | default([]) }}"

- name: Check Node Manager status
  tags: [status, status-nm]
  block:

    - name: Get Node Manager process
      ansible.windows.win_shell: |
        Get-CimInstance Win32_Process |
        Where-Object { $_.CommandLine -match "NodeManager" } |
        Select-Object ProcessId, CommandLine |
        ConvertTo-Json -Depth 3
      register: _nm_process
      changed_when: false
      failed_when: false

    - name: Show Node Manager status
      ansible.builtin.debug:
        msg:
          - "Component : Node Manager"
          - "Status    : {{ 'RUNNING' if _nm_process.stdout | default('') | length > 0 else 'STOPPED' }}"

