- name: Get Oracle Middleware process owners
  tags: [status, status-owners]
  block:

    - name: Get Oracle Middleware process owners
      ansible.windows.win_shell: |
        Get-CimInstance Win32_Process |
        Where-Object {
          $_.CommandLine -match "AdminServer|{{ capture_server }}|NodeManager|UCM_server|IBR_server"
        } |
        ForEach-Object {
          $owner = Invoke-CimMethod -InputObject $_ -MethodName GetOwner
          [PSCustomObject]@{
            ProcessId   = $_.ProcessId
            ProcessName = $_.Name
            Owner       = "$($owner.Domain)\$($owner.User)"
            CommandLine = $_.CommandLine
          }
        } | ConvertTo-Json -Depth 5
      register: oracle_processes
      changed_when: false
      failed_when: false

    - name: Parse Oracle process owners
      ansible.builtin.set_fact:
        _oracle_processes: >-
          {{ oracle_processes.stdout | from_json
             if oracle_processes.stdout | default('') | length > 0
             else [] }}

    - name: Normalize to list
      ansible.builtin.set_fact:
        _oracle_processes: "{{ [_oracle_processes] if _oracle_processes is mapping else _oracle_processes }}"

    - name: Show Oracle process count
      ansible.builtin.debug:
        msg: "Oracle Middleware processes found: {{ _oracle_processes | length }}"

    - name: Print each process owner
      ansible.builtin.debug:
        msg:
          - "PID         : {{ item.ProcessId }}"
          - "ProcessName : {{ item.ProcessName }}"
          - "Owner       : {{ item.Owner }}"
          - "CommandLine : {{ item.CommandLine }}"
      loop: "{{ _oracle_processes }}"
      loop_control:
        label: "PID {{ item.ProcessId }}"

    - name: Warn if no Oracle processes found
      ansible.builtin.debug:
        msg: "WARNING: No Oracle Middleware processes found on {{ inventory_hostname }}"
      when: _oracle_processes | length == 0
