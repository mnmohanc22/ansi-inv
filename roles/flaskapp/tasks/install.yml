---
# roles/flaskapp/tasks/install.yml

- name: "flaskapp | Install system packages"
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
      - python3-devel
      - nginx
      - gcc
     # - firewalld
    state: present
  tags: [flaskapp, install]

- name: "flaskapp | Create flaskapp system user"
  ansible.builtin.user:
    name:       "{{ flaskapp_user }}"
    system:     true
    shell:      /sbin/nologin
    home:       "{{ flaskapp_root }}"
    createhome: false
    comment:    "Flask application service account"
  tags: [flaskapp, install]

- name: "flaskapp | Create application directories"
  ansible.builtin.file:
    path:  "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(flaskapp_user) }}"
    group: "{{ item.group | default(flaskapp_group) }}"
    mode:  "{{ item.mode  | default('0755') }}"
  loop:
    - { path: "{{ flaskapp_root }}",        mode: "0755" }
    - { path: "{{ flaskapp_root }}/app",    mode: "0755" }
    - { path: "{{ flaskapp_root }}/logs",   mode: "0750" }
  tags: [flaskapp, install]
