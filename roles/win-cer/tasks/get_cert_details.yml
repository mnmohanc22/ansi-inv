---
- name: Get certificate details
  block:
    - name: Show input parameters
      ansible.builtin.debug:
        msg:
          - "Store Path: {{ windows_cert_store_path }}"
          - "Friendly Name Filter: '{{ windows_cert_friendly_name }}'"

    - name: Retrieve thumbprint and CN of imported cert
      ansible.windows.win_shell: |
        $friendly = '{{ windows_cert_friendly_name }}'
        $domain   = $friendly -replace '^\*\.', ''
        $cert = Get-ChildItem "{{ windows_cert_store_path }}" |
          Where-Object { $_.FriendlyName -eq $friendly -or
                         $_.Subject -like "*$domain*" } |
          Sort-Object NotAfter -Descending |
          Select-Object -First 1
        if ($cert) {
          $cn = ($cert.Subject -split ',\s*' |
                  Where-Object { $_ -like 'CN=*' } |
                  Select-Object -First 1) -replace '^CN=', ''
          @{
            found      = $true
            thumbprint = $cert.Thumbprint
            cn         = $cn
            expiry     = $cert.NotAfter.ToString('yyyy-MM-dd')
          } | ConvertTo-Json -Compress
        } else {
          @{ found = $false; thumbprint = $null; cn = $null; expiry = $null } | ConvertTo-Json -Compress
        }
      register: _cert_info_raw
      changed_when: false

    - name: Set cert info fact
      set_fact:
        _cert_info: "{{ _cert_info_raw.stdout | default('{}', true) | from_json }}"

    - name: Show cert thumbprint and CN
      ansible.builtin.debug:
        msg:
          - "Thumbprint : {{ _cert_info.thumbprint | default('N/A') }}"
          - "CN         : {{ _cert_info.cn | default('N/A') }}"
          - "Expiry     : {{ _cert_info.expiry | default('N/A') }}"
      when: _cert_info.found | bool

    - name: Certificate not found
      ansible.builtin.debug:
        msg: "No certificate matching '{{ windows_cert_friendly_name }}' found in store."
      when: not _cert_info.found | bool
