---
# Section 6 | Logging and Auditing
# CIS Red Hat Enterprise Linux 9 Benchmark v2.0.0 L1 Server

# 6.1 Configure System Accounting (auditd)
- name: "6.1 | Configure System Accounting (auditd)"
  block:
    - name: "6.1.1 | Ensure auditd is installed"
      ansible.builtin.dnf:
        name:
          - audit
          - audit-libs
        state: present

    - name: "6.1.2 | Ensure auditd service is enabled and active"
      ansible.builtin.service:
        name: auditd
        state: started
        enabled: true

    - name: "6.1.3 | Ensure auditing for processes that start prior to auditd is enabled"
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '(^GRUB_CMDLINE_LINUX=.*)(audit=\d+\s*)?(".*)'
        replace: '\1audit=1 \3'

    - name: "6.1.4 | Ensure audit_backlog_limit is sufficient"
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '(^GRUB_CMDLINE_LINUX=.*)(audit_backlog_limit=\d+\s*)?(".*)'
        replace: '\1audit_backlog_limit=8192 \3'

    - name: "6.1.5 | Ensure audit log storage size is configured"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^max_log_file\s*='
        line: 'max_log_file = 100'

    - name: "6.1.6 | Ensure audit logs are not automatically deleted"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^max_log_file_action\s*='
        line: 'max_log_file_action = keep_logs'

    - name: "6.1.7 | Ensure system is disabled when audit logs are full"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^space_left_action\s*=', line: 'space_left_action = email' }
        - { regexp: '^action_mail_acct\s*=', line: 'action_mail_acct = root' }
        - { regexp: '^admin_space_left_action\s*=', line: 'admin_space_left_action = halt' }
  tags:
    - section6
    - section6_1

# 6.2 Configure Audit Rules
- name: "6.2 | Configure Audit Rules"
  block:
    - name: "6.2.1 | Ensure changes to system administration scope are collected"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/50-scope.rules
        line: "{{ item }}"
        create: true
        owner: root
        group: root
        mode: '0640'
      loop:
        - '-w /etc/sudoers -p wa -k scope'
        - '-w /etc/sudoers.d/ -p wa -k scope'

    - name: "6.2.2 | Ensure actions as another user are always logged"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/50-user_emulation.rules
        line: "{{ item }}"
        create: true
        owner: root
        group: root
        mode: '0640'
      loop:
        - '-a always,exit -F arch=b64 -C euid!=uid -F auid!=unset -S execve -k user_emulation'
        - '-a always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S execve -k user_emulation'

    - name: "6.2.3 | Ensure events that modify the sudo log file are collected"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/50-sudo.rules
        line: '-w /var/log/sudo.log -p wa -k sudo_log_file'
        create: true
        owner: root
        group: root
        mode: '0640'

    - name: "6.2.4 | Ensure events that modify date and time information are collected"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/50-time-change.rules
        line: "{{ item }}"
        create: true
        owner: root
        group: root
        mode: '0640'
      loop:
        - '-a always,exit -F arch=b64 -S adjtimex -S settimeofday -k time-change'
        - '-a always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime -k time-change'
        - '-a always,exit -F arch=b64 -S clock_settime -k time-change'
        - '-a always,exit -F arch=b32 -S clock_settime -k time-change'
        - '-w /etc/localtime -p wa -k time-change'

    - name: "6.2.5 | Ensure events that modify the system's network environment are collected"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/50-system-locale.rules
        line: "{{ item }}"
        create: true
        owner: root
        group: root
        mode: '0640'
      loop:
        - '-a always,exit -F arch=b64 -S sethostname -S setdomainname -k system-locale'
        - '-a always,exit -F arch=b32 -S sethostname -S setdomainname -k system-locale'
        - '-w /etc/issue -p wa -k system-locale'
        - '-w /etc/issue.net -p wa -k system-locale'
        - '-w /etc/hosts -p wa -k system-locale'
        - '-w /etc/sysconfig/network -p wa -k system-locale'

    - name: "6.2.6 | Ensure use of privileged commands are collected"
      ansible.builtin.shell: |
        find / -xdev \( -perm -4000 -o -perm -2000 \) -type f 2>/dev/null | \
          awk '{print "-a always,exit -F path=" $1 " -F perm=x -F auid>=1000 -F auid!=unset -k privileged"}' \
          > /etc/audit/rules.d/50-privileged.rules
      changed_when: false

    - name: "6.2.7 | Ensure unsuccessful file access attempts are collected"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/50-access.rules
        line: "{{ item }}"
        create: true
        owner: root
        group: root
        mode: '0640'
      loop:
        - '-a always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -k access'
        - '-a always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -k access'
        - '-a always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=unset -k access'
        - '-a always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=unset -k access'

    - name: "6.2.8 | Ensure user/group information changes are collected"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/50-identity.rules
        line: "{{ item }}"
        create: true
        owner: root
        group: root
        mode: '0640'
      loop:
        - '-w /etc/group -p wa -k identity'
        - '-w /etc/passwd -p wa -k identity'
        - '-w /etc/gshadow -p wa -k identity'
        - '-w /etc/shadow -p wa -k identity'
        - '-w /etc/security/opasswd -p wa -k identity'

    - name: "6.2.9 | Ensure audit configuration is immutable"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/99-finalize.rules
        line: '-e 2'
        create: true
        owner: root
        group: root
        mode: '0640'

    - name: "6.2 | Reload auditd rules"
      ansible.builtin.service:
        name: auditd
        state: restarted
  tags:
    - section6
    - section6_2

# 6.3 Configure rsyslog
- name: "6.3 | Configure rsyslog"
  block:
    - name: "6.3.1 | Ensure rsyslog is installed"
      ansible.builtin.dnf:
        name: rsyslog
        state: present

    - name: "6.3.2 | Ensure rsyslog service is enabled and active"
      ansible.builtin.service:
        name: rsyslog
        state: started
        enabled: true

    - name: "6.3.3 | Ensure rsyslog default file permissions are configured"
      ansible.builtin.lineinfile:
        path: /etc/rsyslog.conf
        regexp: '^\$FileCreateMode'
        line: '$FileCreateMode 0640'

    - name: "6.3.4 | Ensure logging is configured"
      ansible.builtin.blockinfile:
        path: /etc/rsyslog.d/50-cis.conf
        create: true
        owner: root
        group: root
        mode: '0640'
        block: |
          *.emerg                         :omusrmsg:*
          auth,authpriv.*                 /var/log/secure
          mail.*                          -/var/log/mail
          mail.info                       -/var/log/mail.info
          mail.warning                    -/var/log/mail.warn
          mail.err                        /var/log/mail.err
          cron.*                          /var/log/cron
          *.=warning;*.=err               -/var/log/warn
          *.crit                          /var/log/warn
          *.*;mail.none;newsgroup.none    -/var/log/messages
          local0,local1.*                 -/var/log/localmessages
          local2,local3.*                 -/var/log/localmessages
          local4,local5.*                 -/var/log/localmessages
          local6,local7.*                 -/var/log/localmessages
  tags:
    - section6
    - section6_3

# Audit Section 6
- name: "Section 6 | Audit"
  when: cis_run_audit_section6 or cis_run_audit_all
  block:
    - name: "Audit 6.1 | Check auditd status"
      ansible.builtin.shell: |
        systemctl is-enabled auditd
        systemctl is-active auditd
        grep -E '^(max_log_file|max_log_file_action|space_left_action|admin_space_left_action)' /etc/audit/auditd.conf
      register: audit_auditd
      changed_when: false
      failed_when: false

    - name: "Audit 6.2 | Check audit rules"
      ansible.builtin.shell: |
        auditctl -l 2>/dev/null | head -40
      register: audit_rules
      changed_when: false
      failed_when: false

    - name: "Audit 6.3 | Check rsyslog status"
      ansible.builtin.shell: |
        systemctl is-enabled rsyslog
        systemctl is-active rsyslog
      register: audit_rsyslog
      changed_when: false
      failed_when: false

    - name: "Audit Section 6 | Results"
      ansible.builtin.debug:
        msg:
          - "=== Section 6 Audit Results ==="
          - "auditd status: {{ audit_auditd.stdout_lines }}"
          - "Audit rules: {{ audit_rules.stdout_lines }}"
          - "rsyslog status: {{ audit_rsyslog.stdout_lines }}"
  tags:
    - section6
    - audit
    - audit_section6
