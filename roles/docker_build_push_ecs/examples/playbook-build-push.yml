---
# ============================================================================
# Example: build a Docker image and push it to ECR using AWS profile 'lacare-dev'.
# Run on the Ansible control node:
#   ansible-playbook -i 'localhost,' examples/playbook-build-push.yml
# ============================================================================

- name: "Build and push container image to ECR"
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - role: docker_build_push_ecs
      vars:
        aws_profile: "lacare-dev"
        aws_region:  "us-west-2"

        ecr_repository_name: "platform/sample-api"
        ecr_create_if_missing: true
        ecr_image_scan_on_push: true

        docker_build_context: "/opt/projects/sample-api"
        docker_dockerfile:    "Dockerfile"
        docker_platform:      "linux/amd64"
        docker_build_args:
          APP_VERSION: "1.4.0"

        image_tag: "latest"
        image_additional_tags:
          - "1.4.0"
        image_tag_with_git_sha: true

        push_image: true
        ecs_deploy: false
