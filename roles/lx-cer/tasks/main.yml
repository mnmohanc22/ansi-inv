# ─── Import certificate management task files ───────────────────────────────

- name: "Import certificate copy tasks"
  ansible.builtin.import_tasks: copy-certs.yml
  tags:
    - lx_cer
    - certificates
    - copy_certs
    - apply_certs


- name: "Import certificate apply-cert tasks"
  ansible.builtin.import_tasks: apply-certs.yml
  tags:
    - lx_cer
    - certificates
    - apply_certs
    

- name: "Import certificate check tasks"
  ansible.builtin.import_tasks: check-cert.yml
  tags:
    - lx_cer
    - certificates
    - check_cert

- name: "Import certificate list tasks"
  ansible.builtin.import_tasks: list-cert.yml
  tags:
    - lx_cer
    - certificates
    - list_certs
