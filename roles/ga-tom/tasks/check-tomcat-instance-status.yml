- name: Wait for startup message
  ansible.builtin.shell: |
    grep -q "Server startup in" {{ tomcat_home }}/logs/catalina.out
  register: startup_check
  retries: 30
  delay: 10
  until: startup_check.rc == 0
  changed_when: false


- name: Verify application port
  ansible.builtin.wait_for:
    port: "{{ tomcat_port }}"
    host: "{{ inventory_hostname }}"
    timeout: 60



- name: Verify application health
  ansible.builtin.uri:
    url: "http://{{ inventory_hostname }}:{{ tomcat_port }}/health"
    status_code: 200
  register: app_health
  retries: 12
  delay: 10
  until: app_health.status == 200
##



- name: Wait for Tomcat startup message
  ansible.builtin.shell: |
    grep -q "Server startup in" {{ tomcat_home }}/logs/catalina.out
  register: startup_check
  retries: 30
  delay: 10
  until: startup_check.rc == 0
  changed_when: false
  failed_when: false

- name: Display startup status
  ansible.builtin.debug:
    msg: "Tomcat startup message found"
  when: startup_check.rc == 0

- name: Display warning
  ansible.builtin.debug:
    msg: "WARNING: Tomcat startup message not found in catalina.out"
  when: startup_check.rc != 0