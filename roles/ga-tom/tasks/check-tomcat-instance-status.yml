- name: check tomcat status
  block:

    - name: print env_name for this block
      ansible.builtin.debug:
        msg: "Checking Tomcat status for env_name: {{ env_name }}"

    - name: Verify Tomcat process with env_name filter
      ansible.builtin.shell: |
        ps -ef | grep java | grep -v grep | grep {{ env_name }}
      register: tomcat_process
      changed_when: false
      failed_when: tomcat_process.rc != 0

    - name: Print running Tomcat processes for env_name
      ansible.builtin.debug:
        msg: "{{ tomcat_process.stdout_lines }}"

    - name: check process id
      ansible.builtin.shell: |
        ps -ef | grep tomcat | grep -v grep | grep {{ env_name }} | awk '{print $2}'
      register: tomcat_pid
      changed_when: false
      failed_when: tomcat_pid.rc != 0

    - name: Set fact for pid_list
      ansible.builtin.set_fact:
        pid_list: "{{ tomcat_pid.stdout_lines }}"

    - name: Print Tomcat process ID
      ansible.builtin.debug:
        msg: "{{ pid_list }}"

    - name: "{{ env_name }} | Kill remaining Tomcat processes if not stopped"
      ansible.builtin.shell: |
        kill -9 {{ pid_list | join(' ') }}
      become: true
      become_user: "{{ tomcat_user }}"
      when:
        - pid_list is defined
        - pid_list | length > 0
      register: kill_result
      ignore_errors: true  



