---
- name: Check Docker container status
  block:

    - name: Check Docker service is running
      ansible.builtin.shell: systemctl is-active docker
      register: _docker_svc
      changed_when: false
      failed_when: false

    - name: Show Docker service status
      ansible.builtin.debug:
        msg: "Docker service is {{ _docker_svc.stdout | trim }}"

    - name: Get container status
      ansible.builtin.shell: |
        docker inspect --format \
          'Name={{ "{{" }}.Name{{ "}}" }} Status={{ "{{" }}.State.Status{{ "}}" }} Running={{ "{{" }}.State.Running{{ "}}" }} ExitCode={{ "{{" }}.State.ExitCode{{ "}}" }}' \
          "{{ docker_container_name }}"
      register: _container_inspect
      changed_when: false
      failed_when: false

    - name: Show container inspect result
      ansible.builtin.debug:
        msg: "{{ _container_inspect.stdout | trim }}"
      when: _container_inspect.rc == 0

    - name: Warn if container not found
      ansible.builtin.debug:
        msg: "WARNING: Container '{{ docker_container_name }}' not found on {{ inventory_hostname }}"
      when: _container_inspect.rc != 0

    - name: List all running containers
      ansible.builtin.shell: docker ps --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Image{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Ports{{ '}}' }}"
      register: _docker_ps
      changed_when: false
      failed_when: false

    - name: Show all running containers
      ansible.builtin.debug:
        msg: "{{ _docker_ps.stdout_lines }}"
