---


- name: "{{ env_name }} | Execute Tomcat wrapper script"
  block:

    - name: "{{ env_name }} | Print env_name"
      ansible.builtin.debug:
        msg: "Stopping Tomcat for env: {{ env_name }}"

    - name: import task check tomcat status
      ansible.builtin.include_tasks: check-tomcat-status.yml
      vars:
        env_name: "{{ env_name }}"

    - name: "{{ env_name }} | Assemble server_flags from list"
      ansible.builtin.set_fact:
        _server_flags_str: "{{ server_flags | default([]) | join(' ') }}"

    - name: "{{ env_name }} | Show wrapper commands to run"
      ansible.builtin.debug:
        msg: "{{ wrapper_script }} {{ cmd_flag }} {{ flag_item }}"
      loop: "{{ server_flags | default([]) }}"
      loop_control:
        loop_var: flag_item
        label: "{{ flag_item }}"

    - name: "{{ env_name }} | Run Tomcat wrapper script"
      ansible.builtin.shell: |
        {{ wrapper_script }} {{ cmd_flag }} {{ flag_item }}
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ tomcat_user }}"
      register: tomcat_wrapper_result
      changed_when: true
      ignore_errors: true
      loop: "{{ server_flags | default([]) }}"
      loop_control:
        loop_var: flag_item
        label: "{{ flag_item }}"

    - name: "{{ env_name }} | Display wrapper stdout"
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ tomcat_wrapper_result.results }}"
      loop_control:
        label: "{{ item.flag_item }}"
      ignore_errors: true

    - name: "{{ env_name }} | Kill remaining Tomcat JVMs"
      ansible.builtin.shell: |
        kill -9 {{ tomcat_pids.stdout_lines | join(' ') }}
      become: true
      become_user: "{{ tomcat_user }}"
      ignore_errors: true
      when:
        - tomcat_pids is defined
        - tomcat_pids.stdout_lines is defined
        - tomcat_pids.stdout_lines | length > 0
      register: kill_result
     


