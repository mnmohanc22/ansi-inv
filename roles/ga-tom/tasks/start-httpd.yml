---
- name: Start httpd service
  block:

    - name: Check httpd service status
      ansible.builtin.shell: systemctl is-active httpd
      register: _httpd_status
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ apache_user }}"
      register: _httpd_status

    - name: Show httpd status result
      ansible.builtin.debug:
        msg: "httpd is currently {{ _httpd_status.stdout | trim }}"  

    - name: Start httpd service
      ansible.builtin.shell: systemctl start httpd
      register: _httpd_start
      changed_when: true
      when: _httpd_status.stdout | trim == 'inactive'
      become: true
      become_user: "{{ apache_user }}"

    - name: Show httpd start result
      ansible.builtin.debug:
        msg: "httpd {{ 'started' if _httpd_status.stdout | trim == 'inactive' else 'was already started' }}"

    - name: Verify httpd is started
      ansible.builtin.shell: systemctl is-active httpd
      register: _httpd_verify
      changed_when: false
      failed_when: _httpd_verify.stdout | trim == 'inactive'
      become: true
      become_user: "{{ apache_user }}"
