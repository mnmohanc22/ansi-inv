---
# =============================================================================
# Task File: ec2-metadata.yml – Verify OS and fetch EC2 instance metadata
# =============================================================================

- name: Verify OS and fetch EC2 metadata
  block:
    # ── Verify OS ──────────────────────────────────────────────────────────────
    - name: Assert Red Hat family OS
      ansible.builtin.assert:
        that:
          - ansible_os_family == "RedHat"
          - ansible_distribution_major_version | int >= 8
        fail_msg: "This playbook supports RHEL 8/9 only. Found: {{ ansible_distribution }} {{ ansible_distribution_version }}"
        success_msg: "OS check passed: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"

    # ── Fetch EC2 Instance Metadata (IMDSv2) ──────────────────────────────────
    - name: Get IMDSv2 token
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/api/token
        method: PUT
        headers:
          X-aws-ec2-metadata-token-ttl-seconds: "21600"
        return_content: true
        status_code: 200
        timeout: 5
      register: imds_token
      no_log: true

    - name: Fetch EC2 instance-id
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/meta-data/instance-id
        headers:
          X-aws-ec2-metadata-token: "{{ imds_token.content | trim }}"
        return_content: true
        timeout: 5
      register: _ec2_instance_id

    - name: Fetch EC2 region
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/meta-data/placement/region
        headers:
          X-aws-ec2-metadata-token: "{{ imds_token.content | trim }}"
        return_content: true
        timeout: 5
      register: _ec2_region

    - name: Fetch EC2 account-id
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/meta-data/iam/info
        headers:
          X-aws-ec2-metadata-token: "{{ imds_token.content | trim }}"
        return_content: true
        timeout: 5
      register: _ec2_iam_info

    - name: Fetch EC2 VPC-id
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/meta-data/network/interfaces/macs/
        headers:
          X-aws-ec2-metadata-token: "{{ imds_token.content | trim }}"
        return_content: true
        timeout: 5
      register: _ec2_mac

    - name: Fetch VPC-id using first MAC
      ansible.builtin.uri:
        url: "http://169.254.169.254/latest/meta-data/network/interfaces/macs/{{ _ec2_mac.content | trim | split('\n') | first | trim }}/vpc-id"
        headers:
          X-aws-ec2-metadata-token: "{{ imds_token.content | trim }}"
        return_content: true
        timeout: 5
      register: _ec2_vpc_id

    # ── Set clean facts (strip \n and whitespace) ─────────────────────────────
    - name: Set EC2 metadata facts
      ansible.builtin.set_fact:
        ec2_instance_id: "{{ _ec2_instance_id.content | trim | replace('\\n', '') }}"
        ec2_region:      "{{ _ec2_region.content      | trim | replace('\\n', '') }}"
        ec2_account_id:  "{{ (_ec2_iam_info.content   | from_json).InstanceProfileArn | regex_replace('.*:(\\d{12}):.*', '\\1') }}"
        ec2_vpc_id:      "{{ _ec2_vpc_id.content      | trim | replace('\\n', '') }}"
        ec2_hostname:    "{{ ansible_hostname | trim }}"

    - name: Display EC2 metadata
      ansible.builtin.debug:
        msg:
          - "Instance ID : {{ ec2_instance_id }}"
          - "Region      : {{ ec2_region }}"
          - "Account ID  : {{ ec2_account_id }}"
          - "VPC ID      : {{ ec2_vpc_id }}"
          - "Hostname    : {{ ec2_hostname }}"