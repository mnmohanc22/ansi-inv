# ══════════════════════════════════════════════════════════════════════
# ANSIBLE INVENTORY — app1 & app2 | Each env has its own AWS account
# ══════════════════════════════════════════════════════════════════════
#
#  app1-dev      → 111111111111   VPC: 10.1.0.0/16
#  app1-staging  → 222222222222   VPC: 10.2.0.0/16
#  app1-prod     → 333333333333   VPC: 10.3.0.0/16
#
#  app2-dev      → 444444444444   VPC: 10.4.0.0/16
#  app2-staging  → 555555555555   VPC: 10.5.0.0/16
#  app2-prod     → 666666666666   VPC: 10.6.0.0/16
#
# Leaf group naming: <app>_<env>_<tier>
# ══════════════════════════════════════════════════════════════════════


# ──────────────────────────────────────────────────────────────────────
# APP1 — DEV  (Account: 111111111111)
# ──────────────────────────────────────────────────────────────────────
[app1_dev_frontend]
app1-web-dev-01  ansible_host=10.1.1.10
app1-web-dev-02  ansible_host=10.1.1.11

[app1_dev_api]
app1-api-dev-01  ansible_host=10.1.2.10
app1-api-dev-02  ansible_host=10.1.2.11

[app1_dev_worker]
app1-worker-dev-01  ansible_host=10.1.3.10

[app1_dev_db]
app1-db-dev-01  ansible_host=10.1.4.10


# ──────────────────────────────────────────────────────────────────────
# APP1 — STAGING  (Account: 222222222222)
# ──────────────────────────────────────────────────────────────────────
[app1_staging_frontend]
app1-web-stg-01  ansible_host=10.2.1.10
app1-web-stg-02  ansible_host=10.2.1.11

[app1_staging_api]
app1-api-stg-01  ansible_host=10.2.2.10
app1-api-stg-02  ansible_host=10.2.2.11

[app1_staging_worker]
app1-worker-stg-01  ansible_host=10.2.3.10

[app1_staging_db]
app1-db-stg-01  ansible_host=10.2.4.10


# ──────────────────────────────────────────────────────────────────────
# APP1 — PROD  (Account: 333333333333)
# ──────────────────────────────────────────────────────────────────────
[app1_prod_frontend]
app1-web-prod-01  ansible_host=10.3.1.10
app1-web-prod-02  ansible_host=10.3.1.11
app1-web-prod-03  ansible_host=10.3.1.12

[app1_prod_api]
app1-api-prod-01  ansible_host=10.3.2.10
app1-api-prod-02  ansible_host=10.3.2.11
app1-api-prod-03  ansible_host=10.3.2.12

[app1_prod_worker]
app1-worker-prod-01  ansible_host=10.3.3.10
app1-worker-prod-02  ansible_host=10.3.3.11

[app1_prod_db]
app1-db-prod-01  ansible_host=10.3.4.10
app1-db-prod-02  ansible_host=10.3.4.11  # replica


# ──────────────────────────────────────────────────────────────────────
# APP2 — DEV  (Account: 444444444444)
# ──────────────────────────────────────────────────────────────────────
[app2_dev_frontend]
app2-web-dev-01  ansible_host=10.4.1.10
app2-web-dev-02  ansible_host=10.4.1.11

[app2_dev_api]
app2-api-dev-01  ansible_host=10.4.2.10
app2-api-dev-02  ansible_host=10.4.2.11

[app2_dev_worker]
app2-worker-dev-01  ansible_host=10.4.3.10

[app2_dev_db]
app2-db-dev-01  ansible_host=10.4.4.10


# ──────────────────────────────────────────────────────────────────────
# APP2 — STAGING  (Account: 555555555555)
# ──────────────────────────────────────────────────────────────────────
[app2_staging_frontend]
app2-web-stg-01  ansible_host=10.5.1.10
app2-web-stg-02  ansible_host=10.5.1.11

[app2_staging_api]
app2-api-stg-01  ansible_host=10.5.2.10
app2-api-stg-02  ansible_host=10.5.2.11

[app2_staging_worker]
app2-worker-stg-01  ansible_host=10.5.3.10

[app2_staging_db]
app2-db-stg-01  ansible_host=10.5.4.10


# ──────────────────────────────────────────────────────────────────────
# APP2 — PROD  (Account: 666666666666)
# ──────────────────────────────────────────────────────────────────────
[app2_prod_frontend]
app2-web-prod-01  ansible_host=10.6.1.10
app2-web-prod-02  ansible_host=10.6.1.11
app2-web-prod-03  ansible_host=10.6.1.12

[app2_prod_api]
app2-api-prod-01  ansible_host=10.6.2.10
app2-api-prod-02  ansible_host=10.6.2.11
app2-api-prod-03  ansible_host=10.6.2.12

[app2_prod_worker]
app2-worker-prod-01  ansible_host=10.6.3.10
app2-worker-prod-02  ansible_host=10.6.3.11

[app2_prod_db]
app2-db-prod-01  ansible_host=10.6.4.10
app2-db-prod-02  ansible_host=10.6.4.11  # replica


# ══════════════════════════════════════════════════════════════════════
# APP PARENT GROUPS  — all envs for one app
# ══════════════════════════════════════════════════════════════════════

[app1:children]
app1_dev_frontend
app1_dev_api
app1_dev_worker
app1_dev_db
app1_staging_frontend
app1_staging_api
app1_staging_worker
app1_staging_db
app1_prod_frontend
app1_prod_api
app1_prod_worker
app1_prod_db

[app2:children]
app2_dev_frontend
app2_dev_api
app2_dev_worker
app2_dev_db
app2_staging_frontend
app2_staging_api
app2_staging_worker
app2_staging_db
app2_prod_frontend
app2_prod_api
app2_prod_worker
app2_prod_db


# ══════════════════════════════════════════════════════════════════════
# ENV PARENT GROUPS per app  — one app, one environment
# ══════════════════════════════════════════════════════════════════════

[app1_dev:children]
app1_dev_frontend
app1_dev_api
app1_dev_worker
app1_dev_db

[app1_staging:children]
app1_staging_frontend
app1_staging_api
app1_staging_worker
app1_staging_db

[app1_prod:children]
app1_prod_frontend
app1_prod_api
app1_prod_worker
app1_prod_db

[app2_dev:children]
app2_dev_frontend
app2_dev_api
app2_dev_worker
app2_dev_db

[app2_staging:children]
app2_staging_frontend
app2_staging_api
app2_staging_worker
app2_staging_db

[app2_prod:children]
app2_prod_frontend
app2_prod_api
app2_prod_worker
app2_prod_db


# ══════════════════════════════════════════════════════════════════════
# CROSS-APP ENV GROUPS  — same environment across both apps
# ══════════════════════════════════════════════════════════════════════

[dev:children]
app1_dev
app2_dev

[staging:children]
app1_staging
app2_staging

[prod:children]
app1_prod
app2_prod

[nonprod:children]
dev
staging


# ══════════════════════════════════════════════════════════════════════
# TIER GROUPS  — same tier across all apps and envs
# ══════════════════════════════════════════════════════════════════════

[frontend:children]
app1_dev_frontend
app1_staging_frontend
app1_prod_frontend
app2_dev_frontend
app2_staging_frontend
app2_prod_frontend

[api:children]
app1_dev_api
app1_staging_api
app1_prod_api
app2_dev_api
app2_staging_api
app2_prod_api

[worker:children]
app1_dev_worker
app1_staging_worker
app1_prod_worker
app2_dev_worker
app2_staging_worker
app2_prod_worker

[db:children]
app1_dev_db
app1_staging_db
app1_prod_db
app2_dev_db
app2_staging_db
app2_prod_db


# ══════════════════════════════════════════════════════════════════════
# ACCOUNT GROUPS  — map directly to AWS account boundaries
# ══════════════════════════════════════════════════════════════════════

[account_app1_dev:children]
app1_dev

[account_app1_staging:children]
app1_staging

[account_app1_prod:children]
app1_prod

[account_app2_dev:children]
app2_dev

[account_app2_staging:children]
app2_staging

[account_app2_prod:children]
app2_prod

