# ══════════════════════════════════════════════════════════════════════
# CROSS-APP ENV GROUPS  — same environment across both apps
# ══════════════════════════════════════════════════════════════════════

[dev:children]
app1_dev
app2_dev

[staging:children]
app1_staging
app2_staging

[prod:children]
app1_prod
app2_prod

[nonprod:children]
dev
staging




# ══════════════════════════════════════════════════════════════════════
# ACCOUNT GROUPS  — map directly to AWS account boundaries
# ══════════════════════════════════════════════════════════════════════

[account_app1_dev:children]
app1_dev

[account_app1_staging:children]
app1_staging

[account_app1_prod:children]
app1_prod

[account_app2_dev:children]
app2_dev

[account_app2_staging:children]
app2_staging

[account_app2_prod:children]
app2_prod


# ══════════════════════════════════════════════════════════════════════
# OS GROUPS  — all linux or all windows across every env
# ══════════════════════════════════════════════════════════════════════

[linux:children]
app1_dev_linux


[windows:children]
app1_dev_windows


# ══════════════════════════════════════════════════════════════════════
# ROOT APP GROUP  — app1 is the top of the entire tree
# ══════════════════════════════════════════════════════════════════════

[app1:children]
app1_dev
app1_staging
app1_prod


