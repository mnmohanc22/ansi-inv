# ══════════════════════════════════════════════════════════════════════
# ANSIBLE INVENTORY — app1 & app2 | Each env has its own AWS account
# ══════════════════════════════════════════════════════════════════════
#
#  app1-dev      → 111111111111   VPC: 10.1.0.0/16
#  app1-staging  → 222222222222   VPC: 10.2.0.0/16
#  app1-prod     → 333333333333   VPC: 10.3.0.0/16
#
#  app2-dev      → 444444444444   VPC: 10.4.0.0/16
#  app2-staging  → 555555555555   VPC: 10.5.0.0/16
#  app2-prod     → 666666666666   VPC: 10.6.0.0/16
#
# Leaf group naming: <app>_<env>_<tier>
# ══════════════════════════════════════════════════════════════════════


# ──────────────────────────────────────────────────────────────────────
# APP1 — DEV  (Account: 111111111111)
# ──────────────────────────────────────────────────────────────────────


# ┌─────────────────────────────────────────────────────────────────────
# │ APP1 → DEV  |  Account: 111111111111
# │ Linux Servers
# └─────────────────────────────────────────────────────────────────────


[app1_dev_linux_web]
app1-lnx-web-dev-01  ansible_host=10.1.1.10
app1-lnx-web-dev-02  ansible_host=10.1.1.11

[app1_dev_linux_app]
app1-lnx-api-dev-01  ansible_host=10.1.2.10
app1-lnx-api-dev-02  ansible_host=10.1.2.11

[app1_dev_linux_db]
app1-lnx-db-dev-01  ansible_host=10.1.4.10


# ┌─────────────────────────────────────────────────────────────────────
# │ APP1 → DEV  |  Account: 111111111111
# │ Windows Servers
# └─────────────────────────────────────────────────────────────────────

[app1_dev_windows_web]
app1-win-web-dev-01  ansible_host=10.1.1.20
app1-win-web-dev-02  ansible_host=10.1.1.21

[app1_dev_windows_app]
app1-win-api-dev-01  ansible_host=10.1.2.20
app1-win-api-dev-02  ansible_host=10.1.2.21

[app1_dev_windows_db]
app1-win-db-dev-01  ansible_host=10.1.4.20



# ══════════════════════════════════════════════════════════════════════
# OS GROUPS PER ENV  — connection vars hang here
# ══════════════════════════════════════════════════════════════════════

# ── Dev OS groups ─────────────────────────────────────────────────────

[app1_dev_linux:children]
app1_dev_linux_web
app1_dev_linux_app
app1_dev_linux_db


[app1_dev_windows:children]
app1_dev_windows_web
app1_dev_windows_app
app1_dev_windows_db

# ══════════════════════════════════════════════════════════════════════
# ACCOUNT GROUPS  — all linux + windows per account
# ══════════════════════════════════════════════════════════════════════

# ══════════════════════════════════════════════════════════════════════
# ENV PARENT GROUPS per app  — one app, one environment
# ══════════════════════════════════════════════════════════════════════


[app1_dev:children]
app1_dev_linux
app1_dev_windows



