# ══════════════════════════════════════════════════════════════════════
# OS GROUPS PER ENV  — connection vars hang here
# ══════════════════════════════════════════════════════════════════════

# ── UAT  OS groups ─────────────────────────────────────────────────────

[app1_uat_linux:children]
