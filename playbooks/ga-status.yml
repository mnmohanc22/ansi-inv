---
# ============================================================================
# ga-stop.yml — Check status of GA services in sequence per tier
#
# Sequence:
#   Play 1 - Setup variables          → db
#   Play 2 - Stop Docker              → db
#   Play 3 - Stop Oracle server       → db
#   Play 4 - Stop httpd              → frontend
#   Play 5 - Stop Tomcat server      → api
#   Play 6 - Stop services           → worker
#   Play 7 - Check status             → all
# 
# Usage:
#   ansible-playbook -i inventory/inventory.ini playbooks/ga-stop.yml
#   ansible-playbook -i inventory/inventory.ini playbooks/ga-stop.yml --tags stop-httpd,stop-server
# ============================================================================

- name: "Play 1 | Setup variables"
  hosts: db
  gather_facts: false
  tags: [always, setup]
  pre_tasks:
    - name: "Play 1 | PRE | Show host details"
      ansible.builtin.debug:
        msg:
          - "Host       : {{ inventory_hostname }}"
          - "IP         : {{ ansible_host | default(inventory_hostname) }}"
          - "Groups     : {{ group_names | join(', ') }}"
  tasks:
    - name: Setup variables
      ansible.builtin.include_role:
        name: ga-tom
        tasks_from: setup-vars.yml
  post_tasks:
    - name: "Play 1 | POST | Variables setup complete"
      ansible.builtin.debug:
        msg: "Variables setup complete on {{ inventory_hostname }}"

- name: "Play 2 | Status Docker service and container"
  hosts: db
  gather_facts: false
  tags: [status-docker]
  pre_tasks:
    - name: "Play 2 | PRE | Show host details"
      ansible.builtin.debug:
        msg:
          - "Host       : {{ inventory_hostname }}"
          - "IP         : {{ ansible_host | default(inventory_hostname) }}"
          - "Groups     : {{ group_names | join(', ') }}"

    - name: "Play 2 | PRE | Check Docker is installed"
      ansible.builtin.shell: docker --version
      register: _docker_version
      changed_when: false
      failed_when: _docker_version.rc != 0

    - name: "Play 2 | PRE | Show Docker version"
      ansible.builtin.debug:
        msg: "{{ _docker_version.stdout }}"
  tasks:
    - name: Stop Docker
      ansible.builtin.include_role:
        name: ga-tom
        tasks_from: stop-dk.yml
  post_tasks:
    - name: "Play 2 | POST | Verify Docker service is stopped"
      ansible.builtin.shell: systemctl is-active docker
      register: _docker_active
      changed_when: false
      failed_when: _docker_active.stdout | trim != 'inactive'

    - name: "Play 2 | POST | Docker service status"
      ansible.builtin.debug:
        msg: "Docker service is {{ _docker_active.stdout | trim }}"

- name: "Play 3 | status Oracle server"
  hosts: db
  gather_facts: false
  tags: [status-orcl-server]
  pre_tasks:
    - name: "Play 3 | PRE | Show host details"
      ansible.builtin.debug:
        msg:
          - "Host       : {{ inventory_hostname }}"
          - "IP         : {{ ansible_host | default(inventory_hostname) }}"
          - "Groups     : {{ group_names | join(', ') }}"

  tasks:
    - name: status Oracle
      ansible.builtin.include_role:
        name: ga-tom
        tasks_from: check-orcl-server.yml
  post_tasks:
    - name: "Play 3 | POST | status Oracle listener"
      ansible.builtin.debug:
        msg: "Oracle server status check complete"

  

- name: "Play 4 | Status  httpd"
  hosts: frontend
  gather_facts: false
  tags: [status-httpd]
  pre_tasks:
    - name: "Play 4 | PRE | Show host details"
      ansible.builtin.debug:
        msg:
          - "Host       : {{ inventory_hostname }}"
          - "IP         : {{ ansible_host | default(inventory_hostname) }}"
          - "Groups     : {{ group_names | join(', ') }}"
  tasks:
    - name: status httpd
      ansible.builtin.include_role:
        name: ga-tom
        tasks_from: check-httpd-status.yml
  post_tasks:
    - name: "Play 4 | POST | httpd service status"
      ansible.builtin.debug:
        msg: "httpd service status check complete"

- name: "Play 5 | status  Tomcat server"
  hosts: api
  gather_facts: false
  tags: [check-server]
  pre_tasks:
    - name: "Play 5 | PRE | Show host details"
      ansible.builtin.debug:
        msg:
          - "Host       : {{ inventory_hostname }}"
          - "IP         : {{ ansible_host | default(inventory_hostname) }}"
          - "Groups     : {{ group_names | join(', ') }}"

  tasks:
    - name: check server status
      ansible.builtin.include_role:
        name: ga-tom
        tasks_from: check-server.yml
  post_tasks:

    - name: "Play 5 | POST | Tomcat port status"
      ansible.builtin.debug:
        msg: "Tomcat is listening on port 8080"

- name: "Play 6 | Status services"
  hosts: worker
  gather_facts: false
  tags: [start-services]
  pre_tasks:
    - name: "Play 6 | PRE | Show host details"
      ansible.builtin.debug:
        msg:
          - "Host       : {{ inventory_hostname }}"
          - "IP         : {{ ansible_host | default(inventory_hostname) }}"
          - "Groups     : {{ group_names | join(', ') }}"
  tasks:
    - name: Start services
      ansible.builtin.include_role:
        name: ga-tom
        tasks_from: start-services.yml
  post_tasks:
    - name: "Play 6 | POST | Services start complete"
      ansible.builtin.debug:
        msg: "Services started on {{ inventory_hostname }}"

- name: "Play 7 | Check status"
  hosts: all
  gather_facts: false
  tags: [check-status]
  pre_tasks:
    - name: "Play 7 | PRE | Show target host"
      ansible.builtin.debug:
        msg: "Checking service status on {{ inventory_hostname }}"
  tasks:
    - name: Check server status
      ansible.builtin.include_role:
        name: ga-tom
        tasks_from: check-server.yml

    - name: Check httpd status
      ansible.builtin.include_role:
        name: ga-tom
        tasks_from: check-httpd-status.yml

    - name: Check services status
      ansible.builtin.include_role:
        name: ga-tom
        tasks_from: check-services.yml
  post_tasks:
    - name: "Play 7 | POST | All checks complete"
      ansible.builtin.debug:
        msg: "All service checks complete on {{ inventory_hostname }}"
